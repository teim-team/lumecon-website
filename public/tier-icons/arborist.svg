<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Arborist">
  <!-- The tree grows first (canopy fades in from small + trunk
       reveals from the base); once the tree is in place, the
       wooden support stakes drop into position, the crossbars
       expand, and the tie cord draws on. Sequential narrative
       matches the name: an arborist isn't another growth stage,
       it's the expert tending the tree, so the support
       structure literally comes second.

       Animations live in the embedded <style> below so they run
       even when the SVG is loaded via <img>. One-shot (iteration
       1, forwards fill) so the icon ends in its assembled
       state. -->
  <style>
    /* Tree elements: grow in over the first ~700ms. */
    .arb-trunk { transform-box: fill-box; transform-origin: 50% 100%; animation: arb-grow-trunk .55s .05s both cubic-bezier(.22,.95,.28,1); }
    .arb-canopy-back  { transform-box: fill-box; transform-origin: 50% 100%; animation: arb-grow-canopy .55s .25s both cubic-bezier(.22,.95,.28,1); }
    .arb-canopy-mid   { transform-box: fill-box; transform-origin: 50% 100%; animation: arb-grow-canopy .55s .35s both cubic-bezier(.22,.95,.28,1); }
    .arb-canopy-hi    { animation: arb-fade .35s .55s both ease-out; }

    /* Support structure: snaps in AFTER the tree is in place (~800ms). */
    .arb-stake-left   { transform-box: fill-box; transform-origin: 50% 0%; animation: arb-stake-drop .35s .85s both cubic-bezier(.22,.95,.28,1.15); }
    .arb-stake-right  { transform-box: fill-box; transform-origin: 50% 0%; animation: arb-stake-drop .35s .98s both cubic-bezier(.22,.95,.28,1.15); }
    .arb-cap-left     { animation: arb-snap .22s 1.10s both ease-out; }
    .arb-cap-right    { animation: arb-snap .22s 1.18s both ease-out; }
    .arb-crossbar     { transform-box: fill-box; transform-origin: 50% 50%; animation: arb-cross-expand .28s 1.22s both cubic-bezier(.22,.95,.28,1.15); }
    .arb-tie          { stroke-dasharray: 60; stroke-dashoffset: 60; animation: arb-tie-draw .35s 1.50s both ease-out; }

    @keyframes arb-grow-trunk {
      from { transform: scaleY(0); opacity: 0; }
      to   { transform: scaleY(1); opacity: 1; }
    }
    @keyframes arb-grow-canopy {
      from { transform: scale(.2); opacity: 0; }
      60%  { transform: scale(1.06); opacity: 1; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes arb-fade {
      from { opacity: 0; }
      to   { opacity: .75; }
    }
    @keyframes arb-stake-drop {
      from { transform: translateY(-22px); opacity: 0; }
      75%  { transform: translateY(2px); opacity: 1; }
      to   { transform: none; opacity: 1; }
    }
    @keyframes arb-snap {
      from { transform: translateY(-6px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }
    @keyframes arb-cross-expand {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }
    @keyframes arb-tie-draw {
      from { stroke-dashoffset: 60; }
      to   { stroke-dashoffset: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .arb-trunk, .arb-canopy-back, .arb-canopy-mid, .arb-canopy-hi,
      .arb-stake-left, .arb-stake-right, .arb-cap-left, .arb-cap-right,
      .arb-crossbar, .arb-tie {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
        stroke-dashoffset: 0 !important;
      }
    }
  </style>

  <!-- Ground — identical pair (ellipse + front-edge shadow) to sprout / sapling / tree
       so the four tier icons share a continuous baseline. -->
  <ellipse cx="100" cy="175" rx="76" ry="9" fill="#E8D9A8" opacity="0.72"/>
  <path d="M 24 175 Q 100 167 176 175 L 176 183 L 24 183 Z" fill="#C19A3C" opacity="0.32"/>

  <!-- Tree first (so the support structure layers above it later). -->
  <path class="arb-trunk" d="M 94 175 Q 96 150 98 120 Q 100 108 100 100 Q 100 108 102 120 Q 104 150 106 175 Z" fill="#AE4E2C"/>

  <g class="arb-canopy-back">
    <circle cx="74"  cy="92" r="22" fill="#2C6239" opacity="0.92"/>
    <circle cx="126" cy="92" r="22" fill="#2C6239" opacity="0.92"/>
    <circle cx="100" cy="68" r="26" fill="#2C6239" opacity="0.92"/>
  </g>

  <g class="arb-canopy-mid">
    <circle cx="82"  cy="90" r="18" fill="#3C8050"/>
    <circle cx="118" cy="90" r="18" fill="#3C8050"/>
    <circle cx="100" cy="72" r="22" fill="#3C8050"/>
  </g>

  <g class="arb-canopy-hi">
    <ellipse cx="90"  cy="80" rx="5" ry="3" fill="#A9D5B5" opacity="0.75"/>
    <ellipse cx="112" cy="80" rx="5" ry="3" fill="#A9D5B5" opacity="0.75"/>
  </g>

  <!-- Support structure — snaps in AFTER the tree.
       Stakes drop from above; crossbars expand from center;
       caps snap in; tie cord draws on last. -->
  <rect class="arb-stake-left"  x="74"  y="118" width="4" height="58" fill="#8A3A20"/>
  <rect class="arb-stake-right" x="122" y="118" width="4" height="58" fill="#8A3A20"/>
  <rect class="arb-cap-left"    x="72"  y="116" width="8" height="3"  fill="#5E2812"/>
  <rect class="arb-cap-right"   x="120" y="116" width="8" height="3"  fill="#5E2812"/>
  <rect class="arb-crossbar"    x="74"  y="138" width="52" height="4" fill="#8A3A20"/>
  <rect class="arb-crossbar"    x="74"  y="160" width="52" height="4" fill="#8A3A20"/>

  <path class="arb-tie" d="M 74 130 Q 100 126 126 130" stroke="#3A2418" stroke-width="1.4" fill="none" stroke-linecap="round" pathLength="60"/>
</svg>
