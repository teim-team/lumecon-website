name: Smoke test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - run: npm run build
      # Chromium is the merge gate — deterministic here. WebKit runs too,
      # but headless WebKit is unreliable in this CI runner (intermittent
      # TLS-handshake failures loading external resources, plus layout /
      # timing quirks the d3-geo map and the reveal scripts trip on). Those
      # are environmental, not real regressions, and iOS Safari is covered
      # by hand-QA — so WebKit is informational (continue-on-error) rather
      # than a blocking check.
      - name: Smoke — Chromium (required)
        run: npx playwright test --project=chromium
      - name: Smoke — WebKit (informational)
        run: npx playwright test --project=webkit
        continue-on-error: true
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: |
            test-results/
            playwright-report/
          retention-days: 7
